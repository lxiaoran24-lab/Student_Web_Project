{% extends "base.html" %}

{% block title %}登录{% endblock %}

{% block content %}
<div class="container-auth">
    <div class="header">
        <div class="header-badge">账户入口</div>
        <h2>登录系统</h2>
        <p>请输入你的账号信息</p>
    </div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="section-card compact-card">
            {% for message in messages %}
            <p class="section-card-body">{{ message }}</p>
            {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="post" class="q-card auth-card">
        <label class="field-label">用户名或邮箱</label>
        <input class="input-field" type="text" name="username" placeholder="请输入用户名或邮箱" required>

        <label class="field-label">密码</label>
        <input class="input-field" type="password" name="password" placeholder="请输入密码" required>

        <div class="result-actions">
            <a class="btn" href="{{ url_for('home') }}">返回首页</a>
            <button type="submit" class="btn primary">登录</button>
        </div>
    </form>

    <div class="section-card compact-card">
        <p class="section-card-title">还没有账号？</p>
        <div class="result-actions left">
            <a class="btn" href="{{ url_for('register') }}">去注册</a>
        </div>
    </div>
</div>
{% endblock %}
