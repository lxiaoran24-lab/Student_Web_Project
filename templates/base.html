<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}{% endblock %} - 学生状态综合评估系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="site-bg"></div>

    <header class="topbar">
        <div class="topbar-inner">
            <a href="/" class="brand">
                <div class="brand-mark">S</div>
                <div class="brand-text">
                    <span class="brand-cn">学生状态综合评估系统</span>
                    <span class="brand-en">Student Status Assessment</span>
                </div>
            </a>

            <nav class="nav-links">
                <a href="/">首页</a>
                <a href="{{ url_for('assessment_start') }}">开始评估</a>
            </nav>
        </div>
    </header>

    <main class="page-shell">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <span>Student Status Assessment Demo</span>
            <span>基于学业、消费、身体、心理与未来发展方向的综合评估</span>
        </div>
    </footer>
</body>
</html>
