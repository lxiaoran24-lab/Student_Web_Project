{% extends "base.html" %}
{% block title %}未来发展评估{% endblock %}
{% block content %}
<div class="container">
    <div class="header">
        <div class="header-badge">在线评估</div><h2>未来发展模块</h2>
        <p>请填写当前专业与目标方向，系统将进行专业相似度分析</p>
    </div>
    <div class="progress-row">
        <span class="progress-label">第 5 步 / 共 5 步</span><span class="tag">未来发展</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width: 100%;"></div></div>

    <form method="post">
        <div class="q-card">
            <p class="q-text">请填写你的专业代码信息</p>
            <table>
                <tbody>
                    <tr>
                        <th>当前专业代码（如 1202xx）</th>
                        <td><input class="input-field" type="text" name="current_major_code" value="{{ data.get('current_major_code', '') }}" required></td>
                        <th>目标专业代码（如 0809xx）</th>
                        <td><input class="input-field" type="text" name="target_major_code" value="{{ data.get('target_major_code', '') }}" required></td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="actions">
            <a class="btn" href="{{ url_for('assessment_psychology') }}">← 上一步</a>
            <button class="btn primary" type="submit">生成报告</button>
        </div>
    </form>
</div>
{% endblock %}
