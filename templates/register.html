{% extends "base.html" %}

{% block title %}注册{% endblock %}

{% block content %}
<div class="container-auth">
    <div class="header">
        <div class="header-badge">账户入口</div>
        <h2>注册账号</h2>
        <p>创建账号后可保存历史记录和报告</p>
    </div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="section-card compact-card">
            {% for message in messages %}
            <p class="section-card-body">{{ message }}</p>
            {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="post" class="q-card auth-card">
        <label class="field-label">用户名</label>
        <input class="input-field" type="text" name="username" placeholder="请输入用户名" required>

        <label class="field-label">邮箱</label>
        <input class="input-field" type="email" name="email" placeholder="请输入邮箱" required>

        <label class="field-label">密码</label>
        <input class="input-field" type="password" name="password" placeholder="请输入密码" required>

        <div class="result-actions">
            <a class="btn" href="{{ url_for('login') }}">返回登录</a>
            <button type="submit" class="btn primary">注册</button>
        </div>
    </form>
</div>
{% endblock %}
